<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurum Analytics</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23161B22'/><text x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='700' font-size='18' fill='%23F0B429'>A</text></svg>">
    <link rel="alternate icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23161B22'/><text x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='700' font-size='18' fill='%23F0B429'>A</text></svg>">
    <meta name="description" content="Real-time AI-powered gold market analysis, sentiment tracking, and price prediction dashboard.">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo">Aurum Analytics</div>
        <ul class="nav-links">
            <li><a href="/" class="{{ 'active' if page == 'home' else '' }}">Dashboard</a></li>
            <li><a href="/news" class="{{ 'active' if page == 'news' else '' }}">News Analysis</a></li>
            <li><a href="/chart" class="{{ 'active' if page == 'chart' else '' }}">Charts</a></li>
            <li><a href="/prediction" class="{{ 'active' if page == 'prediction' else '' }}">AI Prediction</a></li>
            <li>
                <form action="/refresh" method="POST" style="margin: 0; display: inline-flex; align-items: center;">
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <button type="submit" class="btn-refresh">Live Refresh ↻</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Aurum Analytics — AI-Powered Gold Market Intelligence</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
